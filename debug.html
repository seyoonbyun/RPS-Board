<!DOCTYPE html>
<html>
<head>
    <title>Placeholder Debug</title>
    <style>
        .test-input {
            width: 300px;
            padding: 10px;
            margin: 10px;
            border: 1px solid #ccc;
        }
        
        /* 하단 텍스트와 동일한 색상 */
        .test-input::placeholder {
            color: rgb(107, 114, 128) !important;
            opacity: 1 !important;
        }
        
        .reference-text {
            color: rgb(107, 114, 128);
            font-size: 12px;
            margin: 10px;
        }
    </style>
</head>
<body>
    <h2>Placeholder 색상 테스트</h2>
    
    <input class="test-input" placeholder="이메일을 입력하세요" />
    <input class="test-input" placeholder="4자리 숫자를 입력하세요" />
    
    <div class="reference-text">※ 로그인 정보는 BNI Connect에 등록된 이메일주소를 포함합니다.</div>
    <div class="reference-text">로그인 오류 문의는 각 지역의 오피스를 통해 문의 부탁드립니다.</div>
    
    <script>
        console.log('Computed placeholder color:', window.getComputedStyle(document.querySelector('.test-input'), '::placeholder').color);
        console.log('Reference text color:', window.getComputedStyle(document.querySelector('.reference-text')).color);
    </script>
</body>
</html>
