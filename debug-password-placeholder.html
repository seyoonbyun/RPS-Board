<!DOCTYPE html>
<html>
<head>
    <title>Password Placeholder Debug</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        
        .test-input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        
        /* Test 1: Direct password placeholder */
        .test1::placeholder { color: rgb(107, 114, 128) !important; }
        
        /* Test 2: With all prefixes */
        .test2::placeholder,
        .test2::-webkit-input-placeholder,
        .test2::-moz-placeholder,
        .test2:-ms-input-placeholder {
            color: rgb(107, 114, 128) !important;
            opacity: 1 !important;
        }
        
        /* Test 3: Extreme specificity */
        html body input[type="password"].test3::placeholder,
        html body input[type="password"].test3::-webkit-input-placeholder,
        html body input[type="password"].test3::-moz-placeholder,
        html body input[type="password"].test3:-ms-input-placeholder {
            color: rgb(107, 114, 128) !important;
            opacity: 1 !important;
            -webkit-text-fill-color: rgb(107, 114, 128) !important;
        }
        
        .reference { color: rgb(107, 114, 128); font-size: 12px; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>Password Placeholder Debug Test</h1>
    
    <div>
        <h3>Test 1: Basic Password Input</h3>
        <input type="password" class="test-input test1" placeholder="4자리 숫자를 입력하세요" />
    </div>
    
    <div>
        <h3>Test 2: All Browser Prefixes</h3>
        <input type="password" class="test-input test2" placeholder="4자리 숫자를 입력하세요" />
    </div>
    
    <div>
        <h3>Test 3: Extreme Specificity</h3>
        <input type="password" class="test-input test3" placeholder="4자리 숫자를 입력하세요" />
    </div>
    
    <div>
        <h3>Reference (Target Color)</h3>
        <div class="reference">이 텍스트와 같은 색상이어야 합니다: rgb(107, 114, 128)</div>
    </div>
    
    <script>
        window.addEventListener('load', () => {
            const inputs = document.querySelectorAll('input[type="password"]');
            inputs.forEach((input, index) => {
                const computedStyle = window.getComputedStyle(input, '::placeholder');
                console.log(`Password ${index + 1} computed placeholder color:`, computedStyle.color);
                console.log(`Password ${index + 1} class:`, input.className);
                
                // Force styles via JavaScript
                input.style.setProperty('--placeholder-color', 'rgb(107, 114, 128)', 'important');
            });
            
            // Reference color
            const ref = document.querySelector('.reference');
            const refStyle = window.getComputedStyle(ref);
            console.log('Reference color:', refStyle.color);
        });
    </script>
</body>
</html>
